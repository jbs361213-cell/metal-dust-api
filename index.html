<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1213 이민형 - 금속 성분 실시간 대시보드</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background-color: var(--card-bg);
            width: 90%;
            max-width: 400px;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        /* 2. 메인 화면 제목 아래 학번/이름 스타일 */
        .author {
            font-size: 1.1rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-top: -15px;
            margin-bottom: 25px;
            display: block;
        }
        h1 {
            color: var(--primary-color);
            font-size: 1.6rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .data-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            background-color: #e8effa;
            border: 1px solid #d0e0f5;
        }
        #item-name {
            font-size: 1rem;
            color: var(--primary-color);
            margin-bottom: 10px;
        }
        .value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            line-height: 1.2;
        }
        .unit {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 5px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 25px;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
            box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);
        }
        .footer {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 20px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🔬 미세먼지 금속성분 분석</h1>
    <span class="author">제작자: 1213 이민형</span>
    
    <p style="color: #7f8c8d; font-size: 0.95rem;">수도권 대기환경연구소 실시간 데이터</p>
    
    <div class="data-box">
        <div id="item-name">납(Pb) 농도</div>
        <div id="metal-value" class="value">-</div>
        <div class="unit">(단위: ng/m³)</div>
    </div>
    
    <button onclick="fetchMetal()">실시간 데이터 업데이트</button>
    <div id="status" class="footer">데이터를 조회하세요.</div>
</div>

<script>
    async function fetchMetal() {
        const key = '1a10badc8e7f0623a5db101c1f12e6eb6353993911572f56fd24fd6a0a21febd';
        const status = document.getElementById('status');
        const valueDiv = document.getElementById('metal-value');
        
        status.innerText = "조회 중...";
        status.style.color = "#95a5a6";
        valueDiv.innerText = "-";

        // 국립환경과학원 금속성분 API 호출 주소
        // date 파라미터는 오늘 날짜(5월 10일)로 설정되어 있습니다. 기한 연장에 따라 필요시 수정하세요.
        const url = `https://apis.data.go.kr/1480523/MetalMeasuringResultService/getMetalMeasuringResultList?serviceKey=${key}&pageNo=1&numOfRows=1&resultType=json&date=20260510&stationCode=1&itemCode=90303&timeCode=RH01`;

        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if(data.getMetalMeasuringResultList && data.getMetalMeasuringResultList.item && data.getMetalMeasuringResultList.item.length > 0) {
                const item = data.getMetalMeasuringResultList.item[0];
                valueDiv.innerText = item.value;
                status.innerText = `측정 일시: ${item.sdate}`;
                status.style.color = "#2c3e50";
            } else {
                valueDiv.innerText = "N/A";
                status.innerText = "해당 날짜에 조회된 데이터가 없습니다.";
                status.style.color = "#e74c3c";
            }

        } catch (e) {
            status.innerText = "데이터 활성화 대기 중(1~2시간)이거나 API 서버 오류입니다.";
            status.style.color = "#e74c3c";
            console.error(e);
        }
    }
</script>

</body>
</html>
